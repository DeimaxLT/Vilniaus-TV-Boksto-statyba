<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vilnius TV Tower Stack</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    background:#0b1130;
  }
  #gameContainer {
    position:relative; width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }
  canvas {
    display:block;
    max-width:100%; max-height:100vh;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
  }
  .overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg, rgba(10,15,45,0.92), rgba(30,10,50,0.92));
    color:#fff; text-align:center; padding:20px;
    z-index:10;
  }
  .hidden { display:none !important; }
  .title {
    font-size:2.4em; font-weight:bold; margin-bottom:6px;
    text-shadow:0 3px 10px rgba(0,0,0,0.6);
    color:#ffe9a8;
  }
  .subtitle { font-size:1.05em; margin-bottom:26px; color:#cfd6ff; max-width:480px; }
  .lang-row { display:flex; gap:16px; margin-bottom:26px; }
  .lang-btn, .start-btn, .restart-btn {
    padding:12px 26px; font-size:1.1em; border:none; border-radius:10px;
    cursor:pointer; font-weight:bold; transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 4px 0 rgba(0,0,0,0.35);
  }
  .lang-btn { background:#3a4b8f; color:#fff; min-width:90px; }
  .lang-btn.selected { background:#e8b13a; color:#2a1e00; }
  .lang-btn:hover, .start-btn:hover, .restart-btn:hover { transform:translateY(-2px); }
  .start-btn { background:#4caf7d; color:#04220f; font-size:1.3em; padding:14px 40px; }
  .restart-btn { background:#e8b13a; color:#2a1e00; margin-top:20px; }
  .instructions { font-size:0.9em; color:#b9c0e6; margin-top:18px; max-width:420px; line-height:1.5; }
  #scoreDisplay {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    color:#fff; font-size:1.6em; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,0.7);
    z-index:5; letter-spacing:1px;
  }
  #layerLabel {
    position:absolute; top:56px; left:50%; transform:translateX(-50%);
    color:#ffe9a8; font-size:0.95em; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,0.7);
    z-index:5;
  }
  .coords {
    font-size:1.1em; color:#9dffb0; margin-top:14px; font-weight:bold;
    background:rgba(0,0,0,0.3); padding:10px 16px; border-radius:8px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="480" height="720"></canvas>

  <div id="scoreDisplay" class="hidden">0</div>
  <div id="layerLabel" class="hidden"></div>

  <!-- LANGUAGE / START SCREEN -->
  <div id="startScreen" class="overlay">
    <div class="title" id="mainTitle">Vilnius TV Tower Stack</div>
    <div class="subtitle" id="mainSubtitle">Choose your language / Pasirinkite kalbą</div>
    <div class="lang-row">
      <button class="lang-btn" id="langEnBtn" onclick="setLanguage('en')">EN</button>
      <button class="lang-btn selected" id="langLtBtn" onclick="setLanguage('lt')">LT</button>
    </div>
    <button class="start-btn" id="startBtn" onclick="startGame()">START</button>
    <div class="instructions" id="instructionsText"></div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="title" id="gameOverTitle">Game Over</div>
    <div class="subtitle" id="gameOverScore"></div>
    <button class="restart-btn" onclick="resetGame()" id="retryBtn">Retry</button>
  </div>

  <!-- WIN SCREEN -->
  <div id="winScreen" class="overlay hidden">
    <div class="title" id="winTitle"></div>
    <div class="coords" id="winCoords"></div>
    <button class="restart-btn" onclick="resetGame()" id="playAgainBtn">Play again</button>
  </div>
</div>

<script>
/* =========================================================
   VILNIUS TV TOWER STACK
   Single-file Stack/Tower Bloxx style game
   ========================================================= */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = canvas.width, CH = canvas.height;

const scoreDisplay = document.getElementById('scoreDisplay');
const layerLabel = document.getElementById('layerLabel');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const winScreen = document.getElementById('winScreen');

let lang = 'lt';

    ]
  }
};

function applyLanguageToUI() {
  const t = TEXT[lang];
  document.getElementById('mainTitle').textContent = t.title;
  document.getElementById('mainSubtitle').textContent = t.subtitle;
  document.getElementById('instructionsText').textContent = t.instructions;
  document.getElementById('startBtn').textContent = t.start;
  document.getElementById('gameOverTitle').textContent = t.gameOver;
  document.getElementById('retryBtn').textContent = t.retry;
  document.getElementById('playAgainBtn').textContent = t.playAgain;
}

function setLanguage(l) {
  lang = l;
  document.getElementById('langEnBtn').classList.toggle('selected', l === 'en');
  document.getElementById('langLtBtn').classList.toggle('selected', l === 'lt');
  applyLanguageToUI();
}
applyLanguageToUI();

// Source crop windows within the 420x594 photo, top->bottom of the real
// tower, mapped to our 8 game layers (bottom of tower -> top of tower).
const IMG_W = 420, IMG_H = 594;
const SRC_CROPS = {
  base:       { sy: 432, sh: 62,  sx: 176, sw: 78  },
  lower:      { sy: 350, sh: 82,  sx: 202, sw: 24  },
  upper:      { sy: 272, sh: 78,  sx: 204, sw: 20  },
  saucerL:    { sy: 236, sh: 36,  sx: 194, sw: 42  },
  restaurant: { sy: 208, sh: 28,  sx: 188, sw: 52  },
  saucerR:    { sy: 186, sh: 22,  sx: 202, sw: 26  },
  spireBase:  { sy: 150, sh: 36,  sx: 208, sw: 12  },
  antenna:    { sy: 18,  sh: 132, sx: 210, sw: 10  }
};

/* ---------------- Layer definitions ---------------- */
// 8 architectural segments, bottom to top.
// Each has a base color scheme so the "photographic" texture
// can be procedurally rendered distinctly per layer.
const PHOTO_SCALE = 1.3; // single scale applied to every segment, so relative sizes match the real photo
const LAYER_DEFS = [
  { key:'base',    color:['#8a7d68','#6b5f4e'], height:Math.round(62*PHOTO_SCALE), startWidth:120, speed:2.8 },
  { key:'lower',   color:['#b7ab90','#8f846c'], height:Math.round(82*PHOTO_SCALE), startWidth:78, speed:3.8 },
  { key:'upper',   color:['#c2b79c','#988c72'], height:Math.round(78*PHOTO_SCALE), startWidth:60, speed:4.7 },
  { key:'saucerL', color:['#3a3a3a','#1f1f1f'], height:Math.round(36*PHOTO_SCALE), startWidth:105, speed:5.6 },
  { key:'restaurant', color:['#54606b','#33393f'], height:Math.round(28*PHOTO_SCALE), startWidth:92, speed:6.5 },
  { key:'saucerR', color:['#2c2c2c','#141414'], height:Math.round(22*PHOTO_SCALE), startWidth:80, speed:7.6 },
  { key:'spireBase', color:['#8a8f96','#5b5f66'], height:Math.round(36*PHOTO_SCALE), startWidth:20, speed:9.4 },
  { key:'antenna', color:['#d13a3a','#e8e8e8'], height:Math.round(132*PHOTO_SCALE), startWidth:7, speed:12, erratic:true }
];

/* ---------------- Game state ---------------- */
let stack = [];        // placed layers: {x, w, h, top, colorPair, key}
let current = null;    // moving block
let layerIndex = 0;
let cameraY = 0;
let gameRunning = false;
let placedCount = 0;
let baseY = CH - 90;    // y position (top) of the very first placed base
const groundY = CH - 60;

function resetGame() {
  gameOverScreen.classList.add('hidden');
  winScreen.classList.add('hidden');
  scoreDisplay.classList.remove('hidden');
  layerLabel.classList.remove('hidden');
  stack = [];
  layerIndex = 0;
  placedCount = 0;
  cameraY = 0;

  const def = LAYER_DEFS[0];
  const firstW = def.startWidth;
  stack.push({
    x: CW/2 - firstW/2, w: firstW, h: def.height,
    top: baseY, key: def.key, color: def.color,
    cropX0: 0, cropX1: 1
  });
  layerIndex = 1;
  spawnCurrent();
  updateLabels();
  gameRunning = true;
  requestAnimationFrame(loop);
}

function spawnCurrent() {
  if (layerIndex >= LAYER_DEFS.length) return;
  const def = LAYER_DEFS[layerIndex];
  const prev = stack[stack.length-1];
  const w = Math.min(def.startWidth, prev.w + 20);
  const top = prev.top - def.height;
  const speed = def.speed + layerIndex * 0.28; // ramp with each layer
  const dir = Math.random() < 0.5 ? -1 : 1;
  current = {
    x: 20, w: w, h: def.height, top: top,
    key: def.key, color: def.color,
    vx: speed * dir,
    erratic: !!def.erratic,
    t: 0,
    cropX0: 0, cropX1: 1
  };
  // start somewhere reasonable
  current.x = CW/2 - w/2 - 80*dir;
}

function updateLabels() {
  const t = TEXT[lang];
  scoreDisplay.textContent = placedCount;
  const name = layerIndex < LAYER_DEFS.length ? t.layers[layerIndex] : t.layers[t.layers.length-1];
  layerLabel.textContent = name;
}

/* ---------------- Input ---------------- */
function dropBlock() {
  if (!gameRunning || !current) return;

  const prev = stack[stack.length-1];
  const curLeft = current.x, curRight = current.x + current.w;
  const prevLeft = prev.x, prevRight = prev.x + prev.w;

  const overlapLeft = Math.max(curLeft, prevLeft);
  const overlapRight = Math.min(curRight, prevRight);
  const overlapW = overlapRight - overlapLeft;

  if (overlapW <= 4) {
    // total miss
    endGame(false);
    return;
  }

  // work out which slice of the source photo survives the trim, so the
  // chopped block still shows the correct portion of the real photograph
  const fullSpan = current.cropX1 - current.cropX0;
  const trimLeftFrac = (overlapLeft - curLeft) / current.w;
  const trimRightFrac = (curRight - overlapRight) / current.w;
  const newCropX0 = current.cropX0 + trimLeftFrac * fullSpan;
  const newCropX1 = current.cropX1 - trimRightFrac * fullSpan;

  const placed = {
    x: overlapLeft, w: overlapW, h: current.h, top: current.top,
    key: current.key, color: current.color,
    cropX0: newCropX0, cropX1: newCropX1
  };
  stack.push(placed);
  placedCount++;

  if (layerIndex === LAYER_DEFS.length - 1) {
    // that was the antenna tip, just placed successfully -> win
    endGame(true);
    return;
  }

  layerIndex++;
  spawnCurrent();
  updateLabels();

  // camera follow so the top stays visible
  const desiredCamera = Math.max(0, (CH*0.55) - placed.top);
  cameraY = desiredCamera;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); dropBlock(); }
});
canvas.addEventListener('mousedown', dropBlock);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dropBlock(); }, {passive:false});

/* ---------------- Update / Render ---------------- */
function updateCurrent() {
  if (!current) return;
  current.t += 1;
  if (current.erratic) {
    // fast + slightly randomized wobble for the antenna tip
    current.x += current.vx;
    if (current.t % 14 === 0) current.vx += (Math.random()-0.5) * 2.2;
    current.vx = Math.max(-11, Math.min(11, current.vx));
  } else {
    current.x += current.vx;
  }
  if (current.x <= 4) { current.x = 4; current.vx *= -1; }
  if (current.x + current.w >= CW-4) { current.x = CW-4-current.w; current.vx *= -1; }
}

function drawSkyBackground() {
  // playful cartoon sky
  const g = ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0, '#8fd3f4');
  g.addColorStop(0.55, '#c8ecf7');
  g.addColorStop(1, '#fbeec2');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,CW,CH);

  // sun
  ctx.fillStyle = '#ffe58a';
  ctx.beginPath(); ctx.arc(CW-60, 70, 34, 0, Math.PI*2); ctx.fill();

  // clouds
  drawCloud(70, 90, 1);
  drawCloud(220, 50, 0.8);
  drawCloud(160, 150, 0.6);

  // cartoon Vilnius skyline silhouette (stylized), fixed to screen bottom
  const skylineY = CH - 40;
  ctx.fillStyle = '#c9e6c6';
  ctx.fillRect(0, skylineY, CW, 40);

  const buildings = [
    {x:0, w:40, h:70, c:'#e3b98c'},
    {x:40, w:30, h:100, c:'#d99a83'},
    {x:75, w:22, h:60, c:'#b7c9e2'},
    {x:CW-50, w:26, h:120, c:'#e3b98c'},
    {x:CW-90, w:34, h:80, c:'#cfe0c2'},
    {x:CW-140, w:24, h:60, c:'#d3c2e2'}
  ];
  buildings.forEach(b => {
    ctx.fillStyle = b.c;
    ctx.fillRect(b.x, skylineY - b.h, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let wy = skylineY-b.h+8; wy < skylineY-6; wy += 16) {
      for (let wx = b.x+4; wx < b.x+b.w-4; wx += 10) {
        ctx.fillRect(wx, wy, 4, 6);
      }
    }
  });

  // little cartoon trees near the towers
  for (let i=0;i<5;i++) {
    const tx = 110 + i*40;
    ctx.fillStyle = '#5b8c4a';
    ctx.beginPath(); ctx.arc(tx, skylineY-14, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7a5230';
    ctx.fillRect(tx-2, skylineY-6, 4, 8);
  }
}

function drawCloud(x,y,scale) {
  ctx.save();
  ctx.translate(x,y); ctx.scale(scale,scale);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.arc(0,0,18,0,Math.PI*2);
  ctx.arc(20,-6,22,0,Math.PI*2);
  ctx.arc(40,0,16,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawTexturedBlock(b) {
  const y = b.top + cameraY;
  if (y > CH || y + b.h < 0) return;

  ctx.save();
  ctx.beginPath();
  ctx.rect(b.x, y, b.w, b.h);
  ctx.clip();

  if (towerImgReady) {
    const crop = SRC_CROPS[b.key];
    // b.cropX0/cropX1 (0..1, set when the block is created/trimmed) tell us
    // which horizontal slice of the source photo this (possibly chopped)
    // block still represents, so a trimmed block shows the correct
    // remaining part of the real photo rather than a squashed full width.
    const x0 = b.cropX0 !== undefined ? b.cropX0 : 0;
    const x1 = b.cropX1 !== undefined ? b.cropX1 : 1;
    const sx = crop.sx + x0 * crop.sw;
    const sw = Math.max(1, (x1 - x0) * crop.sw);
    // scale up uniformly (same ratio for width & height) so the photo
    // just gets bigger, never stretched wider than it really is
    const scale = b.h / crop.sh;
    const dw = sw * scale;
    const dh = b.h;
    const dx = b.x + b.w / 2 - dw / 2;
    ctx.drawImage(TOWER_IMG, sx, crop.sy, sw, crop.sh, dx, y, dw, dh);
    // slight shading so segments read as separate blocks
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(dx, y, dw, dh);
  } else {
    // fallback while the photo is still loading
    ctx.fillStyle = b.color[0];
    ctx.fillRect(b.x, y, b.w, b.h);
  }

  ctx.restore();

  // top highlight edge (gives 3D block feel like Stack game)
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(b.x, y, b.w, 3);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(b.x, y + b.h - 3, b.w, 3);
}

function drawGroundPlate() {
  // pedestal / plaza under the very first base
  const b = stack[0];
  const y = b.top + b.h + cameraY;
  ctx.fillStyle = '#9aa88f';
  ctx.fillRect(0, y, CW, 30);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, y, CW, 4);
}

function render() {
  drawSkyBackground();
  drawGroundPlate();
  stack.forEach(drawTexturedBlock);
  if (current) drawTexturedBlock(current);
}

function loop() {
  if (!gameRunning) return;
  updateCurrent();
  render();
  requestAnimationFrame(loop);
}

/* ---------------- End states ---------------- */
function endGame(won) {
  gameRunning = false;
  current = null;
  scoreDisplay.classList.add('hidden');
  layerLabel.classList.add('hidden');
  const t = TEXT[lang];
  if (won) {
    document.getElementById('winTitle').textContent = t.winTitle;
    document.getElementById('winCoords').textContent = t.winCoords;
    winScreen.classList.remove('hidden');
    playWinAnimation();
  } else {
    document.getElementById('gameOverScore').textContent = t.scorePrefix + placedCount;
    gameOverScreen.classList.remove('hidden');
  }
}

function playWinAnimation() {
  // simple confetti-ish flourish rendered briefly behind the win overlay
  let frames = 0;
  const particles = Array.from({length:60}, () => ({
    x: Math.random()*CW, y: -20 - Math.random()*200,
    vy: 2+Math.random()*3, vx: (Math.random()-0.5)*2,
    color: ['#e8b13a','#4caf7d','#3a4b8f','#e84a4a'][Math.floor(Math.random()*4)]
  }));
  function animate() {
    frames++;
    render();
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 6, 6);
    });
    if (frames < 200) requestAnimationFrame(animate);
  }
  animate();
}

/* ---------------- Start flow ---------------- */
function startGame() {
  startScreen.classList.add('hidden');
  resetGame();
}

// initial static render behind start screen
drawSkyBackground();
</script>
</body>
</html>
